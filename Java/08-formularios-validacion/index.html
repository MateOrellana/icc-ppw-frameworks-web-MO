<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Práctica 8 - Formulario de Registro</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">

    <header class="header">
      <h1>📝 Registro de Usuario</h1>
      <p>Práctica 8 - Validación de Formularios</p>
    </header>

    <div id="mensaje-global" class="mensaje-global oculto"></div>

    <form id="form-registro" novalidate autocomplete="off">

      <!-- 1. Nombre -->
      <div class="form-group">
        <label for="nombre">Nombre completo *</label>
        <input type="text" id="nombre" name="nombre"
               placeholder="Tu nombre completo" maxlength="50">
        <span class="error-msg" id="error-nombre"></span>
      </div>

      <!-- 2. Email -->
      <div class="form-group">
        <label for="email">Correo electrónico *</label>
        <input type="email" id="email" name="email"
               placeholder="tu@email.com">
        <span class="error-msg" id="error-email"></span>
      </div>

      <!-- 3. Teléfono -->
      <div class="form-group">
        <label for="telefono">Teléfono (10 dígitos) *</label>
        <input type="tel" id="telefono" name="telefono"
               placeholder="0991234567" maxlength="10">
        <span class="error-msg" id="error-telefono"></span>
      </div>

      <!-- 4. Fecha de nacimiento -->
      <div class="form-group">
        <label for="fecha-nacimiento">Fecha de nacimiento *</label>
        <input type="date" id="fecha-nacimiento" name="fechaNacimiento">
        <span class="error-msg" id="error-fecha-nacimiento"></span>
      </div>

      <!-- 5. Género -->
      <div class="form-group">
        <label for="genero">Género *</label>
        <select id="genero" name="genero">
          <option value="">-- Selecciona --</option>
          <option value="masculino">Masculino</option>
          <option value="femenino">Femenino</option>
          <option value="otro">Prefiero no decirlo</option>
        </select>
        <span class="error-msg" id="error-genero"></span>
      </div>

      <!-- 6. Contraseña -->
      <div class="form-group">
        <label for="password">Contraseña *</label>
        <div class="input-password">
          <input type="password" id="password" name="password"
                 placeholder="Mínimo 8 caracteres">
          <button type="button" class="btn-toggle-pass" data-target="password">👁</button>
        </div>
        <div class="fuerza-container" id="fuerza-container">
          <div class="fuerza-barra">
            <div class="fuerza-fill" id="fuerza-fill"></div>
          </div>
          <span class="fuerza-texto" id="fuerza-texto">Sin contraseña</span>
        </div>
        <span class="error-msg" id="error-password"></span>
      </div>

      <!-- 7. Confirmar contraseña -->
      <div class="form-group">
        <label for="confirmar-password">Confirmar contraseña *</label>
        <div class="input-password">
          <input type="password" id="confirmar-password" name="confirmarPassword"
                 placeholder="Repite tu contraseña">
          <button type="button" class="btn-toggle-pass" data-target="confirmar-password">👁</button>
        </div>
        <span class="error-msg" id="error-confirmar-password"></span>
      </div>

      <!-- 8. Términos y condiciones -->
      <div class="form-group form-group--checkbox">
        <label class="checkbox-label">
          <input type="checkbox" id="terminos" name="terminos">
          <span>Acepto los <a href="#" class="link">términos y condiciones</a> *</span>
        </label>
        <span class="error-msg" id="error-terminos"></span>
      </div>

      <!-- Botón enviar -->
      <button type="submit" class="btn-submit" id="btn-submit">
        Crear cuenta
      </button>

    </form>

    <footer class="footer">
      <p>Los campos marcados con * son obligatorios</p>
    </footer>

  </div>

  <script src="js/validacion.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
